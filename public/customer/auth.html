<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Masuk & Daftar - RuangRestu</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        rRed: '#FF5A5A',
                        rOrange: '#FF8B5A',
                        rYellow: '#FFD45A',
                    }
                }
            }
        }
    </script>
    <link rel="stylesheet" href="css/auth.css">
</head>
<body class="min-h-screen flex flex-col items-center justify-center p-6 sm:p-10 overflow-y-auto">

    <a href="index.html" class="fixed top-6 left-6 z-50 flex items-center gap-2 bg-white/80 backdrop-blur-md px-4 py-2 rounded-full border border-slate-200 text-slate-600 font-semibold hover:text-rRed transition shadow-sm">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path></svg>
        Kembali
    </a>


    <div class="w-full max-w-xl py-12">
        
        <div class="text-center mb-10">
            <h1 class="text-4xl font-extrabold bg-clip-text text-transparent bg-gradient-to-r from-rRed to-rOrange">
                RuangRestu
            </h1>
            <p class="text-slate-500 mt-2 font-medium">Langkah pertama menuju hari bahagia.</p>
        </div>

        <div class="glass-auth rounded-[3rem] p-8 md:p-14 relative overflow-hidden">
            <div class="absolute -top-10 -right-10 w-32 h-32 bg-rYellow/20 rounded-full blur-3xl"></div>

            <div id="login-sec" class="active-auth">
                
                <div class="mb-8">
            <h2 class="text-3xl font-extrabold text-slate-800">Masuk</h2>
            <p class="text-slate-500 mt-1">Gunakan Akun Google atau data manual Anda.</p>
        </div>

        <div class="mb-8">
            <button class="w-full py-4 px-6 bg-white border border-slate-200 rounded-2xl flex items-center justify-center gap-3 font-bold text-slate-700 hover:bg-slate-50 hover:border-rOrange transition-all shadow-sm active:scale-95">
                <svg class="w-6 h-6" viewBox="0 0 48 48">
                    <path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"></path>
                    <path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"></path>
                    <path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24s.92 7.54 2.56 10.78l7.97-6.19z"></path>
                    <path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"></path>
                </svg>
                Masuk dengan Google
            </button>
            <div class="relative mt-8 mb-4">
                <div class="absolute inset-0 flex items-center"><span class="w-full border-t border-slate-100"></span></div>
                <div class="relative flex justify-center text-xs uppercase"><span class="bg-white px-4 text-slate-400 font-bold tracking-widest">Atau Manual</span></div>
            </div>
        </div>

                <form class="space-y-6">
                    <div class="space-y-2">
                        <label class="text-sm font-bold text-slate-700 ml-1">Email / WhatsApp</label>
                        <input type="text" placeholder="Masukkan detail akun" required
                            class="input-style w-full px-6 py-4 rounded-2xl border border-slate-200 bg-slate-50/50 outline-none">
                    </div>

                    <div class="space-y-2">
                        <div class="flex justify-between">
                            <label class="text-sm font-bold text-slate-700 ml-1">Password</label>
                            <a href="#" class="text-sm font-bold text-rOrange hover:text-rRed">Lupa?</a>
                        </div>
                        <input type="password" placeholder="••••••••" required
                            class="input-style w-full px-6 py-4 rounded-2xl border border-slate-200 bg-slate-50/50 outline-none">
                    </div>

                    <div class="flex items-center px-1">
                        <input type="checkbox" id="save" class="w-5 h-5 rounded accent-rRed border-slate-300">
                        <label for="save" class="ml-3 text-sm font-medium text-slate-600">Tetap masuk</label>
                    </div>

                    <button class="w-full py-5 bg-gradient-to-r from-rRed to-rOrange text-white rounded-[2rem] font-bold text-lg shadow-xl shadow-rRed/20 hover:scale-[1.02] transition-all active:scale-95">
                        Masuk ke Dashboard
                    </button>
                </form>

                <div class="mt-10 text-center">
                    <p class="text-slate-500 font-medium">Belum punya akun? 
                        <button onclick="switchAuth('register')" class="text-rRed font-bold hover:underline">Daftar di sini</button>
                    </p>
                </div>
            </div>

            <div id="register-sec" class="hidden-auth">
                
                <div class="mb-8">
            <h2 class="text-3xl font-extrabold text-slate-800">Buat Akun</h2>
            <p class="text-slate-500 mt-1">Daftar instan dengan Google atau isi manual.</p>
        </div>

        <button class="w-full py-4 px-6 bg-white border border-slate-200 rounded-2xl flex items-center justify-center gap-3 font-bold text-slate-700 hover:bg-slate-50 hover:border-rOrange transition-all shadow-sm mb-8 active:scale-95">
            <svg class="w-6 h-6" viewBox="0 0 48 48">
                <path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"></path>
                <path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"></path>
                <path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24s.92 7.54 2.56 10.78l7.97-6.19z"></path>
                <path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"></path>
            </svg>
            Daftar dengan Google
        </button>

        <div class="relative mb-8">
            <div class="absolute inset-0 flex items-center"><span class="w-full border-t border-slate-100"></span></div>
            <div class="relative flex justify-center text-xs uppercase"><span class="bg-white px-4 text-slate-400 font-bold tracking-widest">Atau Manual</span></div>
        </div>

                <form class="space-y-5">
                    <div class="space-y-1">
                        <label class="text-xs font-bold text-slate-400 uppercase tracking-widest ml-1">Nama Lengkap</label>
                        <input type="text" placeholder="Nama Anda" required
                            class="input-style w-full px-6 py-4 rounded-2xl border border-slate-200 bg-slate-50/50 outline-none">
                    </div>

                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                        <div class="space-y-1">
                            <label class="text-xs font-bold text-slate-400 uppercase tracking-widest ml-1">WhatsApp</label>
                            <input type="tel" placeholder="08..." required
                                class="input-style w-full px-6 py-4 rounded-2xl border border-slate-200 bg-slate-50/50 outline-none">
                        </div>
                        <div class="space-y-1">
                            <label class="text-xs font-bold text-slate-400 uppercase tracking-widest ml-1">Email</label>
                            <input type="email" placeholder="mail@example.com" required
                                class="input-style w-full px-6 py-4 rounded-2xl border border-slate-200 bg-slate-50/50 outline-none">
                        </div>
                    </div>

                    <div class="space-y-1">
                        <label class="text-xs font-bold text-slate-400 uppercase tracking-widest ml-1">Password</label>
                        <input type="password" placeholder="••••••••" required
                            class="input-style w-full px-6 py-4 rounded-2xl border border-slate-200 bg-slate-50/50 outline-none">
                    </div>

                    <div class="p-5 bg-slate-50 rounded-3xl border border-slate-100">
                        <div class="flex items-start">
                            <input type="checkbox" id="agree" required class="mt-1 w-5 h-5 accent-rOrange">
                            <label for="agree" class="ml-3 text-xs text-slate-500 leading-relaxed font-medium">
                                Saya setuju dengan <a href="javascript:void(0)" onclick="openModal('syarat')"> <span class="text-rOrange font-bold cursor-pointer">Syarat & Ketentuan</span></a> serta <a href="javascript:void(0)" onclick="openModal('privasi')" ><span class="text-rOrange font-bold cursor-pointer">Kebijakan Privasi</span></a> RuangRestu.
                            </label>
                        </div>
                    </div>

                    <button class="w-full py-5 bg-gradient-to-r from-rRed to-rOrange text-white rounded-[2rem] font-bold text-lg shadow-xl shadow-rRed/20 hover:scale-[1.02] transition-all mt-2">
                        Daftar Akun
                    </button>
                </form>

                <div class="mt-8 text-center">
                    <p class="text-slate-500 font-medium">Sudah punya akun? 
                        <button onclick="switchAuth('login')" class="text-rRed font-bold hover:underline">Masuk sekarang</button>
                    </p>
                </div>
            </div>
        </div>
    </div>
<footer class="bg-white border-t border-slate-100 pt-16 pb-8">
        <div class="max-w-7xl mx-auto px-4">
            <div class="border-t border-slate-100 mt-8 pt-8 text-center text-slate-400 text-sm">
                &copy; 2026 RuangRestu.com. All rights reserved.
            </div>
        </div>
    </footer>

    <section id="modals-here">
<div id="modal-overlay" class="fixed inset-0 z-[100] hidden bg-slate-900/60 backdrop-blur-sm flex items-center justify-center p-4">
    
    <div id="modal-content" class="bg-white w-full max-w-2xl max-h-[80vh] rounded-[2.5rem] shadow-2xl overflow-hidden relative flex flex-col scale-95 opacity-0 transition-all duration-300">
        
        <div class="p-8 border-b border-slate-100 flex justify-between items-center bg-white sticky top-0 z-10">
            <h3 id="modal-title" class="text-2xl font-bold text-slate-800">Judul Modal</h3>
            <button onclick="closeModal()" class="w-10 h-10 flex items-center justify-center rounded-full hover:bg-slate-100 text-slate-400 hover:text-slate-800 transition">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
            </button>
        </div>

        <div id="modal-body" class="p-8 overflow-y-auto text-slate-600 leading-relaxed">
            </div>

        <div class="p-6 border-t border-slate-100 bg-slate-50 flex justify-end">
            <button onclick="closeModal()" class="px-6 py-2.5 bg-slate-800 text-white rounded-xl font-semibold hover:bg-slate-700 transition">
                Tutup
            </button>
        </div>
    </div>
</div>
    </section>
    <script>
        function switchAuth(type) {
            const loginSec = document.getElementById('login-sec');
            const registerSec = document.getElementById('register-sec');
            
            if(type === 'register') {
                loginSec.classList.replace('active-auth', 'hidden-auth');
                registerSec.classList.replace('hidden-auth', 'active-auth');
            } else {
                registerSec.classList.replace('active-auth', 'hidden-auth');
                loginSec.classList.replace('hidden-auth', 'active-auth');
            }
        }
    </script>
     <script src="js/landing.js"></script>
</body>
</html>
